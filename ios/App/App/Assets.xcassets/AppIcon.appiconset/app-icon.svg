<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient TikTok colors -->
  <defs>
    <linearGradient id="tikTokGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0050"/>
      <stop offset="50%" stop-color="#ff0f7b"/>
      <stop offset="100%" stop-color="#f89b29"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>
  
  <!-- App background -->
  <rect width="1024" height="1024" rx="180" fill="url(#tikTokGradient)"/>
  
  <!-- Play button symbol -->
  <g transform="translate(512,512)">
    <!-- White circle background -->
    <circle cx="0" cy="0" r="200" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
    
    <!-- Play triangle -->
    <path d="M-50,-80 L-50,80 L100,0 Z" fill="#ff0050"/>
    
    <!-- AI text -->
    <text x="0" y="120" text-anchor="middle" fill="#ff0050" font-family="Arial, sans-serif" font-size="48" font-weight="bold">AI</text>
  </g>
  
  <!-- App name -->
  <text x="512" y="900" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="64" font-weight="bold">TikCreator</text>
</svg>